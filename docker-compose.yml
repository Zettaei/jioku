services:
  api:
    container_name: api
    build:
      context: services/api
      dockerfile: Dockerfile
    image: api
    env_file:
      - services/api/.env
    ports:
      - ${COMPOSE_API_EXPOSE_PORT:-8787}:8787
    
  frontend:
    container_name: frontend
    build:
      context: services/frontend
      dockerfile: Dockerfile
    image: frontend
    env_file:
      - services/frontend/.env
    ports:
      - ${COMPOSE_FRONTEND_EXPOSE_PORT:-3000}:3000

  redisstack:
    container_name: redisstack
    build: 
      context: services/redis
      dockerfile: Dockerfile
    image: redisstack
    env_file:
      - services/redis/.env
    ports:
      - ${COMPOSE_REDIS_EXPOSE_PORT:-6379}:6379
    volumes:
      - redis_data:/data
    # restart: unless-stopped

  paddleocr:
    container_name: paddleocr
    build:
      context: services/paddleocr
      dockerfile: Dockerfile
    image: paddleocr
    env_file:
      - services/paddleocr/.env
    ports:
      - ${COMPOSE_PADDLEOCR_EXPOSE_PORT:-8866}:8866
    volumes:
      - paddleocr_logs:/app/logs
      - paddleocr_officialmodels:/home/paddleocr/.paddlex

volumes:
  redis_data:
  paddleocr_logs:
  paddleocr_officialmodels:
